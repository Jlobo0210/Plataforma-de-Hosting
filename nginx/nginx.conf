events {
    worker_connections 4096;
    multi_accept on;
}

http {
    keepalive_timeout 65;
    keepalive_requests 100;

    proxy_connect_timeout 10s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;

    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Rate limiting global: 60 peticiones por minuto por IP.
    # Cada server block de proyecto aplica esta zona via `limit_req`.
    limit_req_zone $binary_remote_addr zone=hosting_ratelimit:10m rate=60r/m;
    limit_req_status 429;

    # Server por defecto: plataforma (UI + API de gestión) en http://localhost
    server {
        listen 80 default_server;
        server_name localhost;

        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Necesario para hot reload de React (WebSocket)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Catch-all para subdominios del patrón proyecto.usuario.localhost
    # que no tengan un server block dinámico activo. Los servers exactos
    # generados por el backend tienen prioridad sobre este regex.
    server {
        listen 80;
        server_name ~^(?<project>[^.]+)\.(?<user>[^.]+)\.localhost$;
        default_type text/plain;
        return 404 "Proyecto no encontrado o no activo\n";
    }

    # Server blocks dinámicos de proyectos (uno por archivo project_*.conf).
    # El backend escribe estos archivos en el volumen compartido y
    # reload_watch.sh recarga NGINX automáticamente.
    include /etc/nginx/locations/project_*.conf;
}
